services:
  # Frontend Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthmitra-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - healthmitra-network
    restart: unless-stopped

  # Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthmitra-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME:-healthmitra}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-healthmitra-secret-2024}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=1440
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-healthmitra-uploads}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - healthmitra-network
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: healthmitra-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - healthmitra-network
    restart: unless-stopped

networks:
  healthmitra-network:
    driver: bridge